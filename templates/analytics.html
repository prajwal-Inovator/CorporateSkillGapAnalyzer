{% extends "base.html" %}
{% block title %}Analytics{% endblock %}
{% block extra_js %}{% endblock %}
{% block content %}
<h1 class="mb-4">Analytics Dashboard</h1>
<div class="row">
    <div class="col-md-6 mb-4">
        <div class="card">
            <div class="card-header">Average Skill Gap by Department</div>
            <div class="card-body"><canvas id="deptGapChart" width="400" height="300"></canvas></div>
        </div>
    </div>
    <div class="col-md-6 mb-4">
        <div class="card">
            <div class="card-header">Top 5 Missing Skills (Company Wide)</div>
            <div class="card-body"><canvas id="missingSkillsChart" width="400" height="300"></canvas></div>
        </div>
    </div>
    <div class="col-md-6 mb-4">
        <div class="card">
            <div class="card-header">Employee Readiness Distribution</div>
            <div class="card-body"><canvas id="readinessChart" width="400" height="300"></canvas></div>
        </div>
    </div>
</div>
{% endblock %}
