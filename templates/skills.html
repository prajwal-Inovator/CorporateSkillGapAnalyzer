{% extends "base.html" %}
{% block title %}Skills Management{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Skills</h1>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addSkillModal"><i class="fas fa-plus"></i> Add Skill</button>
</div>

<div class="card">
    <div class="card-body">
        <table class="table table-striped">
            <thead>
                <tr><th>Skill Name</th><th>Category</th><th>Actions</th></tr>
            </thead>
            <tbody>
                {% for skill in skills %}
                <tr>
                    <td>{{ skill.name }}</td>
                    <td>{{ skill.category or '-' }}</td>
                    <td>
                        <a href="{{ url_for('admin.delete_skill', id=skill.id) }}" class="btn btn-sm btn-danger" onclick="return confirm('Delete this skill?')">Delete</a>
                    </td>
                </tr>
                {% else %}
                <tr><td colspan="3">No skills found.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<!-- Add Skill Modal -->
<div class="modal fade" id="addSkillModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">Add New Skill</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form method="POST" action="{{ url_for('admin.add_skill') }}">
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="name" class="form-label">Skill Name</label>
                        <input type="text" class="form-control" id="name" name="name" required>
                    </div>
                    <div class="mb-3">
                        <label for="category" class="form-label">Category</label>
                        <input type="text" class="form-control" id="category" name="category">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add Skill</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
